name: Format

on:
  pull_request:
    branches: [ "master" ]
    paths:
      - '**.cs'
      - '.github/workflows/dotnet-format.yml'

jobs:
  run-dotnet-format:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Run dotnet format
      uses: wearerequired/lint-action@v3
      with:
        dotnet_format: true
