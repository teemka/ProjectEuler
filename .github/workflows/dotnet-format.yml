name: Format

on:
  pull_request:
    branches: [ "master" ]
    paths:
      - '**.cs'
      - '.github/workflows/dotnet-format.yml'

jobs:
  run-dotnet-format:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Restore dependencies
      run: dotnet restore
    - name: Check formatting
      run: dotnet format --verify-no-changes
